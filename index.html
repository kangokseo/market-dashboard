<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>체슬리 시황판 Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Noto Sans KR','Segoe UI',sans-serif;
    color:#fff;
    min-height:100vh;
    background:#0b1230;
  }

  /* ── BG ── */
  .bg {
    position:fixed; inset:0; z-index:0;
    background:
      linear-gradient(160deg, #091028 0%, #0e1a40 40%, #0b1230 100%);
  }
  .bg::before {
    content:''; position:absolute; inset:0;
    background:
      repeating-linear-gradient(90deg, rgba(60,100,200,.05) 0 1px, transparent 1px 80px),
      repeating-linear-gradient(0deg, rgba(60,100,200,.05) 0 1px, transparent 1px 50px);
  }
  .bg::after {
    content:''; position:absolute; inset:0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 80%, rgba(30,60,160,.12), transparent),
      radial-gradient(ellipse 60% 50% at 80% 20%, rgba(20,50,140,.1), transparent);
  }

  .wrap { position:relative; z-index:1; max-width:1050px; margin:0 auto; padding:36px 20px 48px; }

  /* ── Title ── */
  .title { text-align:center; margin-bottom:28px; }
  .title h1 {
    font-size:1.85rem; font-weight:900; letter-spacing:-0.5px;
    background:linear-gradient(135deg,#fff,#8ab4ff);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
  }
  .title .sub { font-size:.78rem; color:rgba(255,255,255,.35); margin-top:2px; }

  /* ── Month Nav ── */
  .month-nav {
    display:flex; justify-content:center; align-items:center; gap:10px; margin-bottom:24px;
  }
  .update-date {
    text-align:right; font-size:.8rem; color:rgba(255,255,255,.5);
    margin-bottom:8px; padding-right:2px; letter-spacing:.2px;
  }
  .month-nav button {
    background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12);
    color:#fff; width:34px; height:34px; border-radius:50%; cursor:pointer;
    font-size:1rem; display:flex; align-items:center; justify-content:center;
    transition:background .2s;
  }
  .month-nav button:hover { background:rgba(255,255,255,.18); }
  .month-nav select {
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.15);
    color:#fff;
    padding:7px 14px;
    border-radius:8px;
    font-size:.95rem;
    font-weight:700;
    cursor:pointer;
    min-width:130px;
    text-align:center;
    text-align-last:center;
    appearance:none;
    -webkit-appearance:none;
    background-image: linear-gradient(45deg, transparent 50%, rgba(255,255,255,.5) 50%),
                      linear-gradient(135deg, rgba(255,255,255,.5) 50%, transparent 50%);
    background-position: calc(100% - 16px) center, calc(100% - 11px) center;
    background-size: 5px 5px, 5px 5px;
    background-repeat: no-repeat;
    padding-right:30px;
  }
  .month-nav select:focus { outline:none; border-color:rgba(140,180,255,.5); }
  .month-nav select option { background:#0b1230; color:#fff; }

  /* ── Grid Layout ── */
  .grid {
    display:grid;
    grid-template-columns: 140px repeat(7, 1fr);
    gap:3px;
    margin-bottom:16px;
  }

  /* Header cells */
  .hdr {
    background:rgba(255,255,255,.07);
    color:rgba(255,255,255,.65);
    font-weight:700; font-size:.78rem;
    padding:13px 6px; text-align:center;
    border-radius:5px;
    letter-spacing:.5px;
  }

  /* Market name column (left side) */
  .mkt {
    background: linear-gradient(135deg, #111d4a 0%, #162350 100%);
    border-right: 3px solid rgba(80,130,255,.25);
    display:flex; align-items:center; justify-content:center;
    font-size:1.05rem; font-weight:900; letter-spacing:1px;
    color:#fff;
    border-radius:5px;
    min-height:64px;
    text-shadow: 0 1px 8px rgba(80,140,255,.2);
  }

  /* Data cells */
  .cell {
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:12px 6px; border-radius:5px;
    font-weight:700; font-size:.92rem;
    min-height:64px;
    transition:transform .12s, filter .12s;
  }
  .cell:hover { transform:scale(1.04); filter:brightness(1.15); z-index:2; }

  /* ── Color Variants ── */
  .c-blue {
    background:linear-gradient(145deg,#142f78,#1a3d9e);
    color:#8fc0ff;
    text-shadow:0 0 10px rgba(100,170,255,.25);
  }
  .c-lblue {
    background:linear-gradient(145deg,#1a3a50,#1e4a65);
    color:#7dd3fc;
    text-shadow:0 0 8px rgba(125,211,252,.15);
  }
  .c-red {
    background:linear-gradient(145deg,#6b1a1a,#8b2020);
    color:#ffaaaa;
    text-shadow:0 0 10px rgba(255,120,120,.25);
  }
  .c-lred {
    background:linear-gradient(145deg,#4a1e3a,#5c2548);
    color:#f9a8d4;
    text-shadow:0 0 8px rgba(249,168,212,.15);
  }
  .c-green {
    background:linear-gradient(145deg,#14542a,#1a6b35);
    color:#86efac;
    text-shadow:0 0 10px rgba(100,255,150,.25);
  }
  .c-gray {
    background:rgba(255,255,255,.06);
    color:rgba(255,255,255,.55);
  }

  /* 연속월수 big number */
  .cell .big { font-size:1.35rem; font-weight:900; line-height:1; }

  /* AI 진단 */
  .cell .ai-score { font-size:1.05rem; font-weight:900; letter-spacing:.5px; }
  .cell .thumb { font-size:1.3rem; margin-bottom:1px; }


  /* ── Data Range Info ── */
  .data-range {
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:3px;
    margin-top:28px;
    margin-bottom:16px;
  }
  .range-card {
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.08);
    border-radius:6px;
    padding:14px 10px;
    text-align:center;
  }
  .range-card .range-name {
    font-size:.85rem; font-weight:700; color:rgba(255,255,255,.7);
    margin-bottom:8px;
    letter-spacing:.5px;
  }
  .range-card .range-row {
    display:flex; justify-content:space-between; align-items:center;
    font-size:.72rem; color:rgba(255,255,255,.4);
    padding:3px 0;
    border-bottom:1px solid rgba(255,255,255,.04);
  }
  .range-card .range-row:last-child { border-bottom:none; }
  .range-card .range-label { color:rgba(255,255,255,.35); }
  .range-card .range-val { color:rgba(140,180,255,.8); font-weight:600; font-size:.75rem; }
  .range-card .range-val.end-date { color:rgba(100,220,160,.8); }

  .footer { text-align:center; margin-top:20px; color:rgba(255,255,255,.18); font-size:.7rem; }
</style>
</head>

const EMBEDDED_RANGES = {"KOSPI": ["2000-01-04", "2026-06-30"], "KOSDAQ": ["2000-10-16", "2026-06-30"], "NASDAQ": ["2000-01-03", "2026-06-30"], "SP500": ["2000-01-03", "2026-06-30"]};
const BUILT_AT = "2026-07-01 09:03 KST";
/* ── Embedded CSV parsing ── */
const CSV_PATH = 'output/ALL_indicators.csv';
const MKT_DISPLAY = {'SP500':'S&P 500','NASDAQ':'NASDAQ','KOSPI':'KOSPI','KOSDAQ':'KOSDAQ'};
const MKT_ORDER = ['SP500','NASDAQ','KOSPI','KOSDAQ'];

const DATA_FILES = {
  'KOSPI':     'data/kospi.csv',
  'KOSDAQ':    'data/kosdaq.csv',
  'NASDAQ':    'data/nasdaq.csv',
  'SP500':     'data/sp500.csv',
};

let rows = [], months = [], idx = -1;

function parseCSVLine(line) {
  return line.split(',');
}

function color(col, val) {
  switch(col) {
    case '시황':     return val==='강세장'? 'c-red' : 'c-blue';
    case '시장강도': return val==='Hot'? 'c-red' : val==='Cold'? 'c-blue' : 'c-gray';
    case '장기추세': return val==='상승추세'? 'c-red' : 'c-blue';
    case 'Panic':
      if(val==='발생') return 'c-red';
      if(val==='N/A') return 'c-gray';
      return 'c-green';
  }
  return 'c-gray';
}

function energyColor(장기추세, 에너지) {
  // 상승추세 + 상승 = 강세 가속 (red), 하락추세 + 둔화 = 약세 가속 (blue)
  if(에너지==='상승' && 장기추세==='상승추세') return 'c-red';
  if(에너지==='둔화' && 장기추세==='하락추세') return 'c-blue';
  return 'c-gray';
}

function monthsColor(시황, v) {
  // 연속상승월 색을 시황과 일치: 강세장→빨강, 약세장→파랑
  return 시황==='강세장' ? 'c-red' : 시황==='약세장' ? 'c-blue' : 'c-gray';
}

function aiColor(v) {
  if(!v||v==='N/A') return 'c-gray';
  const n=parseInt(v);
  if(n>=90) return 'c-red';
  if(n>=70) return 'c-lred';
  if(n>=40) return 'c-lblue';
  return 'c-blue';
}

function render(month) {
  const mData = rows.filter(r=>r['날짜']===month);
  const grid = document.getElementById('grid');

  // Remove old data rows (keep 8 header cells)
  while(grid.children.length > 8) grid.removeChild(grid.lastChild);

  document.getElementById('mainTitle').textContent = '체슬리 시황판';
  document.getElementById('monthSelect').value = month;

  MKT_ORDER.forEach(mk => {
    const r = mData.find(d=>d['시장']===mk);
    if(!r) return;

    // Market name cell
    const mktEl = document.createElement('div');
    mktEl.className = 'mkt';
    mktEl.textContent = MKT_DISPLAY[mk];
    grid.appendChild(mktEl);

    // 시황
    const c1 = document.createElement('div');
    c1.className = 'cell ' + color('시황', r['시황']);
    c1.textContent = r['시황'];
    grid.appendChild(c1);

    // 시장강도
    const c2 = document.createElement('div');
    c2.className = 'cell ' + color('시장강도', r['시장강도']);
    c2.textContent = r['시장강도'];
    grid.appendChild(c2);

    // 연속월수
    const c3 = document.createElement('div');
    c3.className = 'cell ' + monthsColor(r['시황'], r['연속월수']);
    c3.innerHTML = '<span class="big">' + r['연속월수'] + '</span>';
    grid.appendChild(c3);

    // 장기추세
    const c4 = document.createElement('div');
    c4.className = 'cell ' + color('장기추세', r['장기추세']);
    c4.textContent = r['장기추세'];
    grid.appendChild(c4);

    // 시장에너지
    const c5 = document.createElement('div');
    c5.className = 'cell ' + energyColor(r['장기추세'], r['시장에너지']);
    c5.textContent = r['시장에너지'];
    grid.appendChild(c5);

    // Panic
    const c6 = document.createElement('div');
    c6.className = 'cell ' + color('Panic', r['Panic']);
    c6.textContent = r['Panic'];
    grid.appendChild(c6);

    // AI 진단
    const c7 = document.createElement('div');
    c7.className = 'cell ' + aiColor(r['AI진단']);
    c7.innerHTML = '<span class="ai-score">' + r['AI진단'] + '</span>';
    grid.appendChild(c7);
  });
}

function nav(dir) {
  const n = idx+dir;
  if(n>=0 && n<months.length) { idx=n; render(months[idx]); }
}

/* ── Load CSV via fetch (works on file:// too with relaxed security, otherwise use a local server) ── */
async function init() {
  let text = EMBEDDED_CSV;

  const lines = text.trim().split('\n');
  const hdr = lines[0].split(',');

  for(let i=1;i<lines.length;i++) {
    const vals = lines[i].split(',');
    const obj = {};
    hdr.forEach((h,j) => obj[h]=vals[j]||'');
    rows.push(obj);
  }

  months = [...new Set(rows.map(r=>r['날짜']))].sort();
  idx = months.length - 1;

  // 드롭다운 옵션 생성 (최신월부터 역순)
  const select = document.getElementById('monthSelect');
  months.slice().reverse().forEach(m => {
    const opt = document.createElement('option');
    opt.value = m;
    const _o = m.split('-');
    opt.textContent = _o[0] + '년 ' + parseInt(_o[1],10) + '월';
    select.appendChild(opt);
  });

  document.getElementById('prevBtn').addEventListener('click', ()=>nav(-1));
  document.getElementById('nextBtn').addEventListener('click', ()=>nav(1));
  select.addEventListener('change', e => {
    idx = months.indexOf(e.target.value);
    render(months[idx]);
  });

  render(months[idx]);

  // Load data range info from each CSV
  loadDataRanges();

  // Update date = 실제 대시보드 재빌드 시각(BUILT_AT, 미국 동부시각)
  const built = (typeof BUILT_AT !== 'undefined' && BUILT_AT) ? BUILT_AT : '';
  if (built) {
    document.getElementById('updateDate').textContent = `업데이트: ${built}`;
  }
}

function loadDataRanges() {
  const container = document.getElementById('dataRange');
  container.innerHTML = '';
  for (const name of MKT_ORDER) {
    const r = EMBEDDED_RANGES[name];
    if(!r) continue;
    const card = document.createElement('div');
    card.className = 'range-card';
    card.innerHTML = `
      <div class="range-name">${MKT_DISPLAY[name] || name}</div>
      <div class="range-row">
        <span class="range-label">Start</span>
        <span class="range-val">${r[0]}</span>
      </div>
      <div class="range-row">
        <span class="range-label">End</span>
        <span class="range-val end-date">${r[1]}</span>
      </div>
    `;
    container.appendChild(card);
  }
}

init();
</script>
